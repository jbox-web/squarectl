---
name: CI

permissions: {}

# crystalline is the Crystal LSP server, only needed in an editor.
# Its macOS binary (>= 0.18.0) is dynamically linked against
# /opt/homebrew/opt/llvm/lib/libLLVM.dylib, which is absent on the runners,
# so the plugin post_install check fails. CI never uses it, so skip installing it.
env:
  MISE_DISABLE_TOOLS: crystalline

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Check formatting
        run: mise dev:format-check

  ameba:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Run static code analysis
        run: mise dev:ameba

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Build API docs
        run: mise dev:docs

  test_linux_amd64:
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt

  test_linux_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt

  # Best-effort early warning against the Crystal nightly compiler. mise has no
  # nightly build, so this job uses the nightly container directly and is allowed
  # to fail.
  test_nightly_linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    container: crystallang/crystal:nightly
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install dependencies
        run: shards install --skip-postinstall --skip-executables

      - name: Run tests
        run: crystal spec --error-trace

      - name: Run tests (multi-threaded)
        run: crystal spec --error-trace -Dpreview_mt
        env:
          CRYSTAL_WORKERS: "4"

  test_macos_arm64:
    runs-on: macos-26
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      # TODO: remove me when https://github.com/crystal-lang/crystal/issues/16746 is fixed
      - name: Fix Crystal shards
        run: mise dev:fix-shards-command

      - name: Install dependencies
        run: mise dev:deps

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt

  test_macos_amd64:
    runs-on: macos-26-intel
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      # TODO: remove me when https://github.com/crystal-lang/crystal/issues/16746 is fixed
      - name: Fix Crystal shards
        run: mise dev:fix-shards-command

      - name: Install dependencies
        run: mise dev:deps

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt
